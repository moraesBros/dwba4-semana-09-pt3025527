<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IFSP - Pirituba</title>

<link rel="stylesheet" href="css/menu.css">
<script src="js/disabling.js"></script>

<style>

/* CARROSSEL */
.slideshow-container{
    max-width: 900px;
    position: relative;
    margin: auto;
    margin-top: 20px;
}

.slide{
    display: none;
}

.slide img{
    width: 100%;
    height: 400px;
    border-radius: 10px;
}

/* BOLINHAS */
.dots{
    text-align: center;
    margin-top: 10px;
}

.dot{
    height: 15px;
    width: 15px;
    margin: 0 5px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
    transition: background-color 0.6s ease;
}

.active{
    background-color: #333;
}

</style>

</head>

<body>

<header>    

<div id="menuhorizontal">
    <ul>
        <li><a href="index.html" target="_top">HOME</a></li>
        <li><a href="eventos.html" target="_top">EVENTOS</a></li>
        <li><a href="contato.html" target="_top">CONTATO</a></li>

        <li class="dropdown">
            <a href="javascript:void(0)" class="dropbtn">CURSOS</a>

            <div class="dropdown-content">
                <a href="ads.html" target="_top">
                    Análise e Desenvolvimento de Sistemas
                </a>

                <a href="#" target="_top">
                    Engenharia de Produção
                </a>
            </div>
        </li>

        <li><a href="entrar.html" target="_top">ENTRAR</a></li>
        <li id='about'><a href="sobre.html" target="_top">SOBRE</a></li>
    </ul>

    <img src="Imagens/Logo.jpg" alt="Logo" />
</div>    

</header>


<!-- CARROSSEL -->
<div class="slideshow-container">

    <div class="slide">
        <img src="Imagens/imagem1.jpg" alt="Imagem 1">
    </div>

    <div class="slide">
        <img src="Imagens/imagem2.jpg" alt="Imagem 2">
    </div>

    <div class="slide">
        <img src="Imagens/imagem3.jpg" alt="Imagem 3">
    </div>

    <div class="slide">
        <img src="Imagens/imagem4.jpg" alt="Imagem 4">
    </div>

</div>

<!-- BOLINHAS -->
<div class="dots">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
    <span class="dot" onclick="currentSlide(4)"></span>
</div>


<script>

let slideIndex = 0;

showSlides();

function showSlides(){

    let slides = document.getElementsByClassName("slide");
    let dots = document.getElementsByClassName("dot");

    for(let i = 0; i < slides.length; i++){
        slides[i].style.display = "none";
    }

    slideIndex++;

    if(slideIndex > slides.length){
        slideIndex = 1;
    }

    for(let i = 0; i < dots.length; i++){
        dots[i].className = dots[i].className.replace(" active", "");
    }

    slides[slideIndex - 1].style.display = "block";

    dots[slideIndex - 1].className += " active";

    setTimeout(showSlides, 3000); // troca a cada 3 segundos
}


/* CLICAR NAS BOLINHAS */
function currentSlide(n){

    let slides = document.getElementsByClassName("slide");
    let dots = document.getElementsByClassName("dot");

    for(let i = 0; i < slides.length; i++){
        slides[i].style.display = "none";
    }

    for(let i = 0; i < dots.length; i++){
        dots[i].className = dots[i].className.replace(" active", "");
    }

    slides[n - 1].style.display = "block";
    dots[n - 1].className += " active";

    slideIndex = n - 1;
}

</script>

</body>
</html>
